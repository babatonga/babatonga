name: Profile metrics

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: General stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: babatonga
          filename: metrics-stats.svg
          template: classic
          base: header, activity, community, repositories
          config_timezone: Europe/Berlin

      - name: Top languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: babatonga
          filename: metrics-langs.svg
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          config_timezone: Europe/Berlin
